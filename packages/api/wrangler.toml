name = "talosdealer-api"
main = "src/worker.ts"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[vars]
BETTER_AUTH_URL = "https://api.talosdealer.com"
AWS_REGION = "us-east-1"
ANTHROPIC_SMALL_FAST_MODEL = "us.anthropic.claude-sonnet-4-6"

# Secrets (set via `wrangler secret put`):
# - DATABASE_URL
# - BETTER_AUTH_SECRET
# - RESEND_API_KEY
# - AWS_BEARER_TOKEN_BEDROCK (for AI chat concierge — reuse the scraper's token)

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "roostdealer-images"

[[routes]]
pattern = "api.talosdealer.com/*"
zone_name = "talosdealer.com"

[[routes]]
pattern = "api.staging.talosdealer.com/*"
zone_name = "talosdealer.com"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
