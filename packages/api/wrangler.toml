name = "roostdealer-api"
main = "src/worker.ts"
compatibility_date = "2026-04-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
BETTER_AUTH_URL = "https://api.talosdealer.com"

# Secrets (set via `wrangler secret put`):
# - DATABASE_URL
# - BETTER_AUTH_SECRET

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "roostdealer-images"

[[routes]]
pattern = "api.talosdealer.com/*"
zone_name = "talosdealer.com"

[[routes]]
pattern = "api.staging.talosdealer.com/*"
zone_name = "talosdealer.com"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
